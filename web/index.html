<!doctype html>
<html lang="en" class="dark">
  <head>
    <script>
      (function () {
        try {
          if (localStorage.getItem("cockpit.theme") === "light") {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) { /* storage unavailable — keep the static default: dark */ }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1F006E" />
    <meta name="description" content="Glanceable dashboard for the personal brain pipeline" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link
      rel="preload"
      href="fonts/bricolage-grotesque-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="fonts/hanken-grotesk-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Brain Cockpit</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
